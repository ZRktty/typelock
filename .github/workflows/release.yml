name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.14"  # semantic-release@25 requires ^22.14.0 || >=24.10.0
          cache: pnpm
          registry-url: "https://registry.npmjs.org/"  # needed for @semantic-release/npm OIDC detection

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm test

      - name: Configure git identity for release commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Release
        # @semantic-release/git is not bundled — install it alongside semantic-release
        run: pnpm dlx --package=semantic-release --package=@semantic-release/git semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Clear setup-node's NODE_AUTH_TOKEN (GitHub OIDC token, not an npm token)
          # so it doesn't override the npm token @semantic-release/npm exchanges via OIDC.
          NODE_AUTH_TOKEN: ""
          NPM_CONFIG_PROVENANCE: "true"
