name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.14"  # semantic-release@25 requires ^22.14.0 || >=24.10.0
          cache: pnpm
          # No registry-url here — setup-node with registry-url creates an .npmrc
          # that sets _authToken=${NODE_AUTH_TOKEN}, which conflicts with npm's native
          # OIDC Trusted Publisher flow. Without it, npm exchanges the OIDC token itself.

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm test

      - name: Configure git identity for release commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Release
        # @semantic-release/git is not bundled — install it alongside semantic-release
        run: pnpm dlx --package=semantic-release --package=@semantic-release/git semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN needed — npm Trusted Publisher (OIDC) authenticates via
          # the id-token:write permission above. registry-url in setup-node wires
          # up the .npmrc; npm exchanges the OIDC token at publish time.
          NPM_CONFIG_PROVENANCE: "true"
